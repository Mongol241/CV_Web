<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofoliu - Proiecte GitHub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Desktop Icons -->
  <div class="desktop-icons">
    <a href="profile.html" class="desktop-icon">
      <img src="profil.png" alt="Profil">
      <span>Profil</span>
    </a>
    <a href="portfolio.html" class="desktop-icon active-icon">
      <img src="portofoliugit.png" alt="Portofoliu">
      <span>Portofoliu</span>
    </a>
    <a href="experience.html" class="desktop-icon">
      <img src="experienta.png" alt="Experienta">
      <span>Experienta</span>
    </a>
    <a href="education.html" class="desktop-icon">
      <img src="educatie.png" alt="Educatie">
      <span>Educatie</span>
    </a>
  </div>

  <!-- Window -->
  <div class="desktop">
    <div class="window">
      <div class="title-bar">
        <span>💻 Portofoliu</span>
        <a href="index.html" class="title-close">✕</a>
      </div>


      <div class="content">
        <fieldset class="group-box">
          <legend>Repository-uri GitHub</legend>

          <div id="repo-container"></div>
        </fieldset>
      </div>

      <div class="status-bar">Pagina: Portofoliu | Sursa: GitHub API</div>
    </div>
  </div>

  <div class="taskbar">
    <button class="start-btn" onclick="alert('Bine ai venit!')">🪟 Start</button>
    <div class="taskbar-items">
      <div class="taskbar-tab">
        <span>💻 Portofoliu</span>
        <a href="index.html" class="tab-close" title="Inchide">✕</a>
      </div>
    </div>
    <div class="clock" id="clock">00:00</div>
  </div>

  <script src="script.js"></script>
</body>

</html>
