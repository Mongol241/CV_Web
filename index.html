<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop - Portofoliu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="desktop-only">

  <div class="desktop-icons">

    <a href="profile.html" class="desktop-icon">
      <img src="profil.png" alt="Profil">
      <span>Profil</span>
    </a>

    <a href="portfolio.html" class="desktop-icon">
      <img src="portofoliugit.png" alt="Portofoliu">
      <span>Portofoliu</span>
    </a>

    <a href="experience.html" class="desktop-icon">
      <img src="experienta.png" alt="Experienta">
      <span>Experienta</span>
    </a>

    <a href="education.html" class="desktop-icon">
      <img src="educatie.png" alt="Educatie">
      <span>Educatie</span>
    </a>

  <div class="taskbar">
    <button class="start-btn" onclick="alert('Bine ai venit!')">🪟 Start</button>
    <div class="taskbar-items"></div>
    <div class="clock" id="clock">00:00</div>
  </div>

  <script src="script.js"></script>

</html>
